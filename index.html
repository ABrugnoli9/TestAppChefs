  function coutFiche(fRow, sousfiches){                                    // coût / personne

  // Liste des produits d'un menu, en quantité PAR PERSONNE (agrège fiches + sous-fiches)
  function achatsMenu(choisies, sousfiches){
    const acc={};
    const add=(id,q)=>{ acc[id]=(acc[id]||0)+q; };
    choisies.forEach(f=>{
      (f.data?.lignes||[]).forEach(l=>add(l.prod,num(l.cote)));
      (f.data?.sousfiches||[]).forEach(ref=>{ const sf=sousfiches.find(x=>x.id===ref.sf); if(sf)(sf.data?.lignes||[]).forEach(l=>add(l.prod,num(l.cote)*num(ref.qte))); });
    });
    return Object.entries(acc).map(([prod,q])=>({prod,q}));
  }

    const m=row.data||{}; const nb=m.couverts||1;
    const { jsPDF } = window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});

    // Logo en haut à droite (si dispo)

    doc.text("RESTAURANTS BOCUSE", 14, 14);
    doc.setTextColor(26,10,0); doc.setFontSize(18); doc.setFont('helvetica','bold');

    doc.setDrawColor(228,228,228); doc.setLineWidth(0.3); doc.line(14,30,196,30);

    doc.setTextColor(40,40,40); doc.setFont('helvetica','bold'); doc.text(nb+" couverts", 196, y, {align:'right'}); doc.setFont('helvetica','normal');
    y+=6; doc.setFontSize(9); doc.setTextColor(120,120,120); doc.text("Date : "+(m.date||""), 14, y);

    // Bloc coûts / prix de vente
    y+=9;
    doc.setFillColor(247,242,232); doc.roundedRect(14,y-4,182,21,2,2,'F');
    doc.setFontSize(9.5); doc.setTextColor(60,60,60);
    doc.text("Coût matière : "+eur(m.total)+" / pers.    ("+eur((m.total||0)*nb)+" pour "+nb+" couverts)", 18, y+2);

    doc.setFontSize(12); doc.setTextColor(123,63,0); doc.setFont('helvetica','bold'); doc.text("Composition du menu", 14, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(40,40,40);
    (m.items||[]).forEach(it=>{ y+=6; doc.text("•  "+it, 16, y); });

    // Tableau produits (unité après la quantité si dispo)
    y+=8;
    const body=(m.achats||[]).map(a=>{ const p=prod(a.prod); return [ p?p.nom:a.prod, qfmt(a.q*nb*1.05, p?(p.unite||""):"") ]; });
    doc.autoTable({
      startY:y,
      head:[["Produit à acheter","Quantité (production +5 %)"]],
      body: body.length?body:[["—","—"]],
      theme:'striped',
      headStyles:{fillColor:[123,63,0],textColor:[255,255,255],fontSize:10},
      styles:{fontSize:9,cellPadding:2.5},
      columnStyles:{1:{halign:'right',cellWidth:55}},
      margin:{left:14,right:14},
    });

    const ph=doc.internal.pageSize.getHeight();
    doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text("Restaurants Bocuse · Coût & Menus", 14, ph-8);

    doc.save("menu_"+String(row.nom||"menu").replace(/[^a-z0-9]+/gi,"_")+".pdf");
  }

  // ---- Livre de recettes Bocuse ----
  async function decompress(b64){
    const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const ds=new DecompressionStream("gzip"); const w=ds.writable.getWriter(); w.write(bytes); w.close();
    const chunks=[]; const rd=ds.readable.getReader(); while(true){const{done,value}=await rd.read(); if(done)break; chunks.push(value);}
    const tot=chunks.reduce((a,c)=>a+c.length,0); const out=new Uint8Array(tot); let o=0; for(const c of chunks){out.set(c,o);o+=c.length;}
    return new TextDecoder().decode(out);
  }
  const ALLERG = {gluten:["Gluten","🌾"],crustaces:["Crustacés","🦐"],oeufs:["Œufs","🥚"],poissons:["Poissons","🐟"],arachides:["Arachides","🥜"],soja:["Soja","🫘"],lait:["Lait","🥛"],fruits_coque:["Fruits à coque","🌰"],celeri:["Céleri","🥬"],moutarde:["Moutarde","🟡"],sesame:["Sésame","🌿"],so2_sulfites:["Sulfites","🍷"],lupin:["Lupin","🌸"],mollusques:["Mollusques","🦑"]};
  function recettesLivre(livre){ if(!livre) return []; let i=0; const tag=(a,t)=>(a||[]).map(r=>({...r,_type:t,_uid:t+"-"+(i++)})); return [...tag(livre.entrees,"Entrée"),...tag(livre.plats,"Plat"),...tag(livre.desserts,"Dessert")]; }
  // Pré-remplissage "meilleur effort" : relie les ingrédients texte aux produits de la liste de prix
  const norm = s => (s||"").toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  function matchIngredients(recipe){
    const lignes=[];
    (recipe.ingredients||[]).forEach(txt=>{
      const n=norm(txt);
      const p=PRODUITS.find(pr=>{ const nm=norm(pr.nom); return n.includes(nm) || n.includes(nm.replace(/s$/,'')) || nm.split(' ').some(w=>w.length>=4 && n.includes(w)); });
      const q=(txt.match(/\d+[.,]?\d*/)||[])[0];
      if(p) lignes.push({prod:p.id, cote: q? q.replace(',','.') : ""});
    });
    return lignes;
  }

      ]);
      if(a.error||b.error||c.error){ setStatut("erreur : "+((a.error||b.error||c.error).message)); return; }
      setSF(a.data||[]); setFiches(b.data||[]); setMenus(c.data||[]); setStatut("connecté ✔");
    }
    useEffect(()=>{ tout(); },[]);

    return (
      <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#f5f0e8"}}>

          <div style={{marginTop:5,display:"inline-flex",alignItems:"center",gap:5,background:"#123",color:"#7fd4a8",fontSize:"0.58rem",padding:"3px 8px",borderRadius:20}}>☁ Registre partagé · {statut}</div>

          {tab==="recettes" && <VueRecettes fiches={fiches} sousfiches={sousfiches} reload={tout} draft={draft} setDraft={setDraft} />}
          {tab==="livre"    && <VueLivre livre={livre} progs={progs} recettesDB={recettesDB} reloadR={chargerRecettes} onCreate={(r)=>{ setDraft({nom:r.nom,type:r._type,lignes:matchIngredients(r),ref:r.ingredients||[]}); setTab("recettes"); }} />}
          {tab==="registre" && <VueRegistre menus={menus} reload={tout} />}
          {tab==="prix"     && <VuePrix reload={chargerProduits} />}
        </div>

        <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto",display:"flex",background:"#fff",borderTop:"1px solid #e0d8cc"}}>
          {[["menu","Menu","🧮"],["recettes","Recettes","📋"],["livre","Livre","📖"],["registre","Registre","☁"],["prix","Prix","🏷️"]].map(([k,l,e])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,border:"none",background:"none",padding:"9px 1px",cursor:"pointer",color:tab===k?"#7b3f00":"#999",borderTop:tab===k?"2px solid #7b3f00":"2px solid transparent"}}>

  // ---------- éditeur de lignes de produits ----------
  function EditeurLignes({lignes,setLignes}){
    const maj=(i,obj)=>setLignes(lignes.map((l,j)=>j===i?{...l,...obj}:l));
    return (
      <div>
        <datalist id="produits-dl">{PRODUITS.map(p=><option key={p.id} value={p.nom} />)}</datalist>

          <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <input list="produits-dl" value={l.txt!==undefined?l.txt:(p?p.nom:"")} onChange={e=>{ const v=e.target.value; const f=PRODUITS.find(x=>x.nom===v); maj(i,{txt:v,prod:f?f.id:""}); }} placeholder="produit (rechercher…)" style={{...inp,flex:1,padding:"7px 8px"}} />
            <input type="number" step="0.001" value={l.cote} onChange={e=>maj(i,{cote:e.target.value})} placeholder="qté" style={{width:58,padding:"7px 6px",border:"1px solid #ddd",borderRadius:6,textAlign:"right"}} />
            <span style={{width:26,fontSize:"0.6rem",color:"#999"}}>{p?(p.unite||""):""}</span>

          </div>
        );})}
        <button onClick={()=>setLignes([...lignes,{prod:"",cote:"",txt:""}])} style={{...btn,fontSize:"0.72rem",padding:"5px 10px"}}>+ ajouter un produit</button>
      </div>
    );
  }

  function ChampPersonnes({n,setN}){

      <div style={{background:"#efe8dc",borderRadius:8,padding:"9px 12px",marginTop:12,display:"flex",alignItems:"center",gap:10}}>

  // ================= RECETTES (FT + SFT au même endroit) =================
  function VueRecettes({fiches,sousfiches,reload,draft,setDraft}){
    const [kind,setKind] = useState("ft");    // "ft" | "sft"
    const [form,setForm] = useState(null);    // null | {edit: row|null}
    const [q,setQ]       = useState("");
    const [cat,setCat]   = useState("Toutes");

    useEffect(()=>{ if(draft){ setKind("ft"); setForm({edit:null,nom:draft.nom,type:draft.type,lignes:draft.lignes,ref:draft.ref}); if(setDraft)setDraft(null); } },[draft]);

    if(form){
      if(kind==="ft") return <FormFiche sousfiches={sousfiches} existing={form.edit} initialNom={form.nom} initialType={form.type || (cat!=="Toutes"?cat:undefined)} initialLignes={form.lignes} refIngredients={form.ref} onDone={()=>{setForm(null);reload();}} onCancel={()=>setForm(null)} />;
      return <FormSF existing={form.edit} onDone={()=>{setForm(null);reload();}} onCancel={()=>setForm(null)} />;
    }

    const liste = (kind==="ft"?fiches:sousfiches).filter(x=>(x.nom||"").toLowerCase().includes(q.toLowerCase()) && (kind!=="ft" || cat==="Toutes" || x.type===cat));

    return (
      <div>
        {/* sélecteur FT / SFT */}
        <div style={{display:"flex",background:"#e7ddcd",borderRadius:10,padding:3,marginBottom:12}}>
          {[["ft","Fiches techniques"],["sft","Sous-fiches"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setKind(k);setQ("");}} style={{flex:1,border:"none",borderRadius:8,padding:"8px 4px",cursor:"pointer",fontSize:"0.8rem",fontWeight:"bold",background:kind===k?"#7b3f00":"transparent",color:kind===k?"#fff":"#7b3f00"}}>{l}</button>
          ))}
        </div>

        {kind==="ft" && <div style={{display:"flex",gap:6,marginBottom:10}}>
          {[["Toutes","Toutes"],["Entrée","Entrées"],["Plat","Plats"],["Dessert","Desserts"]].map(([v,l])=>(
            <button key={v} onClick={()=>setCat(v)} style={{flex:1,border:"1px solid "+(cat===v?"#7b3f00":"#ddd"),background:cat===v?"#7b3f00":"#fff",color:cat===v?"#fff":"#7b3f00",borderRadius:8,padding:"6px 3px",cursor:"pointer",fontSize:"0.7rem",fontWeight:"bold"}}>{l}</button>
          ))}
        </div>}
        <SearchBar q={q} setQ={setQ} ph={kind==="ft"?"Rechercher une fiche…":"Rechercher une sous-fiche…"} />

        <button onClick={()=>setForm({edit:null})} style={{...btn,width:"100%",background:"#7b3f00",color:"#fff",border:"none",marginBottom:12}}>+ {kind==="ft"?"Nouvelle fiche technique":"Nouvelle sous-fiche"}</button>

        {kind==="sft" && <p style={note}>Une sous-fiche est une préparation réutilisable (sauce, garniture…). Souvent saisie pour 10-15 pers., mais stockée par personne.</p>}
        {liste.length===0 && <p style={note}>Aucun résultat.</p>}

        {kind==="ft"
          ? liste.map(f=><FicheCard key={f.id} f={f} sousfiches={sousfiches} onEdit={()=>setForm({edit:f})} onDelete={async()=>{ if(confirm("Supprimer cette fiche ?")){ await sb.from("fiches").delete().eq("id",f.id); reload(); } }} />)
          : liste.map(sf=><SFCard key={sf.id} sf={sf} onEdit={()=>setForm({edit:sf})} onDelete={async()=>{ if(confirm("Supprimer cette sous-fiche ?")){ await sb.from("sous_fiches").delete().eq("id",sf.id); reload(); } }} />)
        }
      </div>
    );
  }

  // ---------- Formulaire FICHE TECHNIQUE ----------
  function FormFiche({sousfiches,existing,initialType,initialNom,initialLignes,refIngredients,onDone,onCancel}){
    const N0 = existing?.data?.personnes || 1;
    const [nom,setNom]   = useState(existing?.nom || initialNom || "");
    const [type,setType] = useState(existing?.type || initialType || "Plat");
    const [pers,setPers] = useState(String(N0));
    const [lignes,setLignes] = useState(existing ? (existing.data.lignes||[]).map(l=>({prod:l.prod,cote:String(r6(num(l.cote)*N0))})) : ((initialLignes&&initialLignes.length)? initialLignes.map(l=>({prod:l.prod,cote:String(l.cote)})) : [{prod:"",cote:""}]));
    const [sfs,setSfs]   = useState(existing ? (existing.data.sousfiches||[]).map(r=>({sf:r.sf,qte:String(r6(num(r.qte)*N0))})) : []);
    const [busy,setBusy] = useState(false);
    const N = Math.max(1,num(pers));

    const totalSaisi = coutLignes(lignes) + sfs.reduce((s,r)=>{ const sf=sousfiches.find(x=>x.id===r.sf); return s+(sf?coutSF(sf)*num(r.qte):0); },0);
    const parPers = totalSaisi / N;

    async function save(){
      if(!nom.trim()){ alert("Donnez un nom à la fiche."); return; }
      setBusy(true);
      const data = { nom, type, personnes:N,
        lignes: lignes.filter(l=>l.prod).map(l=>({prod:l.prod, cote:r6(num(l.cote)/N)})),
        sousfiches: sfs.filter(r=>r.sf).map(r=>({sf:r.sf, qte:r6(num(r.qte)/N)})) };
      const payload = { nom, type, data };
      const res = existing ? await sb.from("fiches").update(payload).eq("id",existing.id) : await sb.from("fiches").insert(payload);
      setBusy(false);
      if(res.error){ alert("Erreur : "+res.error.message); return; }
      onDone();
    }
    return (
      <div>
        <H titre={existing?"Modifier la fiche":"Nouvelle fiche technique"} />
        <label style={lbl}>Nom de la fiche</label>
        <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Ex : Filet de bar rôti" style={inp} />
        <label style={{...lbl,marginTop:10}}>Catégorie</label>
        <select value={type} onChange={e=>setType(e.target.value)} style={inp}>{TYPES.map(t=><option key={t}>{t}</option>)}</select>

        <ChampPersonnes n={pers} setN={setPers} />

        {refIngredients&&refIngredients.length>0 && <div style={{background:"#f4f0e6",border:"1px dashed #d8cbb0",borderRadius:8,padding:"8px 10px",marginTop:10}}>
          <div style={{fontSize:"0.64rem",color:"#8a7050",fontWeight:"bold",marginBottom:4}}>📖 Ingrédients de la recette (référence) :</div>
          <div style={{fontSize:"0.72rem",color:"#6a5a44",lineHeight:1.5}}>{refIngredients.map((g,i)=><div key={i}>• {g}</div>)}</div>
          <div style={{fontSize:"0.62rem",color:"#a08a60",fontStyle:"italic",marginTop:5}}>Les produits reconnus sont pré-remplis ci-dessous — vérifiez et complétez.</div>
        </div>}

        <div style={sec}>Produits (quantités pour {N} pers.)</div>
        <EditeurLignes lignes={lignes} setLignes={setLignes} />

        <div style={sec}>Sous-fiches (facultatif)</div>
        {sousfiches.length===0 && <p style={note}>Aucune sous-fiche disponible. Créez-en d'abord dans « Sous-fiches ».</p>}
        {sfs.map((r,i)=>(
          <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <select value={r.sf} onChange={e=>setSfs(sfs.map((x,j)=>j===i?{...x,sf:e.target.value}:x))} style={{...inp,flex:1,padding:"7px 8px"}}>
              <option value="">— sous-fiche —</option>
              {sousfiches.map(sf=><option key={sf.id} value={sf.id}>{sf.nom} ({eur(coutSF(sf))}/pers.)</option>)}
            </select>
            <input type="number" step="0.1" value={r.qte} onChange={e=>setSfs(sfs.map((x,j)=>j===i?{...x,qte:e.target.value}:x))} placeholder="qté" style={{width:56,padding:"7px 6px",border:"1px solid #ddd",borderRadius:6,textAlign:"right"}} />
            <button onClick={()=>setSfs(sfs.filter((_,j)=>j!==i))} style={{border:"none",background:"none",color:"#c00",cursor:"pointer"}}>✕</button>
          </div>
        ))}
        {sousfiches.length>0 && <button onClick={()=>setSfs([...sfs,{sf:"",qte:N}])} style={{...btn,fontSize:"0.72rem",padding:"5px 10px"}}>+ ajouter une sous-fiche</button>}

        <div style={{background:"#1a0a00",color:"#f5efe0",borderRadius:10,padding:"11px 14px",marginTop:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"0.76rem"}}>Coût pour {N} pers.</span><span style={{fontSize:"0.95rem"}}>{eur(totalSaisi)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><span style={{fontSize:"0.8rem",fontWeight:"bold"}}>Coût / personne</span><span style={{fontSize:"1.2rem",fontWeight:"bold",color:"#e0b060"}}>{eur(parPers)}</span></div>
        </div>

        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={onCancel} style={{...btn,flex:1}}>Annuler</button>
          <button onClick={save} disabled={busy} style={{...btn,flex:2,background:"#7b3f00",color:"#fff",border:"none"}}>{busy?"…":"☁ Enregistrer"}</button>
        </div>
      </div>
    );
  }

  // ---------- Formulaire SOUS-FICHE ----------
  function FormSF({existing,onDone,onCancel}){
    const N0 = existing?.data?.personnes || 10;
    const [nom,setNom]   = useState(existing?.nom || "");
    const [pers,setPers] = useState(String(N0));
    const [lignes,setLignes] = useState(existing ? (existing.data.lignes||[]).map(l=>({prod:l.prod,cote:String(r6(num(l.cote)*N0))})) : [{prod:"",cote:""}]);
    const [busy,setBusy] = useState(false);
    const N = Math.max(1,num(pers));
    const totalSaisi = coutLignes(lignes);
    const parPers = totalSaisi / N;

    async function save(){
      if(!nom.trim()){ alert("Donnez un nom à la sous-fiche."); return; }
      setBusy(true);
      const data = { nom, personnes:N, lignes: lignes.filter(l=>l.prod).map(l=>({prod:l.prod, cote:r6(num(l.cote)/N)})) };
      const payload = { nom, data };
      const res = existing ? await sb.from("sous_fiches").update(payload).eq("id",existing.id) : await sb.from("sous_fiches").insert(payload);
      setBusy(false);
      if(res.error){ alert("Erreur : "+res.error.message); return; }
      onDone();
    }
    return (
      <div>
        <H titre={existing?"Modifier la sous-fiche":"Nouvelle sous-fiche"} />
        <label style={lbl}>Nom (ex : Beurre blanc)</label>
        <input value={nom} onChange={e=>setNom(e.target.value)} style={inp} />
        <ChampPersonnes n={pers} setN={setPers} />
        <div style={sec}>Produits (quantités pour {N} pers.)</div>
        <EditeurLignes lignes={lignes} setLignes={setLignes} />
        <div style={{background:"#1a0a00",color:"#f5efe0",borderRadius:10,padding:"11px 14px",marginTop:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"0.76rem"}}>Coût pour {N} pers.</span><span style={{fontSize:"0.95rem"}}>{eur(totalSaisi)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><span style={{fontSize:"0.8rem",fontWeight:"bold"}}>Coût / personne</span><span style={{fontSize:"1.2rem",fontWeight:"bold",color:"#e0b060"}}>{eur(parPers)}</span></div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={onCancel} style={{...btn,flex:1}}>Annuler</button>
          <button onClick={save} disabled={busy} style={{...btn,flex:2,background:"#7b3f00",color:"#fff",border:"none"}}>{busy?"…":"☁ Enregistrer"}</button>
        </div>
      </div>
    );
  }

  // ================= REGISTRE (section à part) =================
  function VueRegistre({menus,reload}){
    const [q,setQ]=useState("");
    const liste = menus.filter(m=>((m.nom||"")+" "+((m.data&&m.data.maison)||"")).toLowerCase().includes(q.toLowerCase()));
    return (
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <H titre="Registre des menus" />
          <button onClick={reload} style={{...btn,fontSize:"0.72rem",padding:"5px 10px"}}>↻</button>
        </div>
        <p style={note}>Tous les menus enregistrés, communs à tous les chefs.</p>
        <SearchBar q={q} setQ={setQ} ph="Rechercher un menu…" />
        {liste.length===0 && <p style={note}>Aucun menu.</p>}
        {liste.map(row=><MenuCard key={row.id} row={row} onDelete={async()=>{ if(confirm("Supprimer ce menu ?")){ await sb.from("menus").delete().eq("id",row.id); reload(); } }} />)}
      </div>
    );
  }

  function MenuCard({row,onDelete}){
    const [open,setOpen]=useState(false);
    const m=row.data||{}; const nb=m.couverts||1;
    return (
      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"11px 13px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"bold",color:"#1a0a00"}}>{row.nom}</div>
          <button onClick={onDelete} style={{border:"none",background:"none",color:"#c00",cursor:"pointer"}}>🗑</button>
        </div>
        <div style={{fontSize:"0.68rem",color:"#7b3f00",fontWeight:"bold",marginTop:1}}>🏠 {m.maison||"—"} · {nb} couverts</div>
        <div style={{fontSize:"0.6rem",color:"#aaa",marginBottom:5}}>{m.date||row.created_at}</div>
        {(m.items||[]).map((it,j)=><div key={j} style={{fontSize:"0.74rem",color:"#666"}}>· {it}</div>)}
        <div style={{display:"flex",gap:12,marginTop:7,fontSize:"0.74rem"}}>
          <span>Matière : <b>{eur(m.total)}</b></span>
          <span>PV : <b style={{color:"#2d6a4f"}}>{eur(m.pv)}</b></span>
          <span>FC : <b>{(m.foodcost||0).toFixed(1).replace('.',',')} %</b></span>
        </div>
        <div style={{display:"flex",gap:8,marginTop:9}}>
          <button onClick={()=>setOpen(!open)} style={{...btn,flex:1,fontSize:"0.72rem",padding:"6px 8px"}}>{open?"▲ Masquer":"🛒 Produits à acheter"}</button>
          <button onClick={()=>exportPDF(row)} style={{...btn,flex:1,fontSize:"0.72rem",padding:"6px 8px",background:"#1a0a00",color:"#e0b060",border:"none"}}>🧾 Export PDF</button>
        </div>
        {open && <div style={{marginTop:8,borderTop:"1px solid #eee",paddingTop:8}}>
          <div style={{fontSize:"0.66rem",color:"#8a7050",marginBottom:6}}>Pour <b>{nb}</b> clients — quantités <b>production +5 %</b> :</div>
          {!m.achats && <p style={note}>Détail indisponible (menu créé avant cette fonction).</p>}
          {(m.achats||[]).map((a,i)=>{ const p=prod(a.prod); const q=a.q*nb*1.05; return <Row key={i} g={p?p.nom:a.prod} d={qfmt(q,p?p.unite:"")} top={i===0} />; })}
        </div>}
      </div>
    );
  }

  // ================= LISTE DE PRIX =================
  function VuePrix({reload}){
    const [q,setQ]=useState("");
    const [add,setAdd]=useState(false);
    const [nom,setNom]=useState(""); const [prix,setPrix]=useState(""); const [busy,setBusy]=useState(false);
    const liste = PRODUITS.filter(p=>(p.nom||"").toLowerCase().includes(q.toLowerCase()));
    const shown = liste.slice(0,60);
    async function ajouter(){
      if(!nom.trim()){ alert("Nom requis"); return; }
      setBusy(true);
      const {error}=await sb.from("produits").insert({nom:nom.trim(),prix:num(prix),unite:null});
      setBusy(false);
      if(error){ alert(/duplicate|unique/i.test(error.message)?"Ce produit existe déjà.":"Erreur : "+error.message); return; }
      setNom(""); setPrix(""); setAdd(false); if(reload) await reload();
    }
    return (
      <div>
        <H titre="Liste de prix" />
        <p style={note}><b>{PRODUITS.length}</b> produits importés d'Easilys.</p>
        <button onClick={()=>setAdd(!add)} style={{...btn,width:"100%",marginBottom:10,background:add?"#fff":"#7b3f00",color:add?"#7b3f00":"#fff",border:add?"1px solid #7b3f00":"none"}}>{add?"✕ Annuler":"+ Ajouter un produit"}</button>
        {add && <div style={{background:"#fff",border:"1px solid #eee",borderRadius:10,padding:12,marginBottom:12}}>
          <label style={lbl}>Nom du produit</label>
          <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Ex : SAFRAN EN PISTILS" style={inp} />
          <label style={{...lbl,marginTop:8}}>Prix</label>
          <input type="number" step="0.01" value={prix} onChange={e=>setPrix(e.target.value)} placeholder="Ex : 12.50" style={inp} />
          <button onClick={ajouter} disabled={busy} style={{...btn,width:"100%",marginTop:10,background:"#7b3f00",color:"#fff",border:"none"}}>{busy?"…":"☁ Enregistrer le produit"}</button>
        </div>}
        <SearchBar q={q} setQ={setQ} ph="Rechercher un produit…" />
        <div style={{fontSize:"0.62rem",color:"#aaa",marginBottom:8}}>{liste.length} résultat(s){liste.length>60?" — 60 affichés":""}</div>
        {shown.map(p=>(
          <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"8px 12px",marginBottom:5}}>
            <span style={{fontSize:"0.82rem",color:"#1a0a00"}}>{p.nom}</span>
            <span style={{fontSize:"0.82rem",color:"#7b3f00",fontWeight:"bold"}}>{eur(p.prix)}{p.unite?<span style={{color:"#aaa",fontWeight:"normal",fontSize:"0.7rem"}}> / {p.unite}</span>:null}</span>
          </div>
        ))}
        {liste.length===0 && <p style={note}>Aucun produit trouvé.</p>}
      </div>
    );
  }

  // ================= LIVRE DE RECETTES BOCUSE =================
  function VueLivre({livre,progs,onCreate,recettesDB,reloadR}){
    const [q,setQ]   = useState("");
    const [cat,setCat]= useState("Toutes");
    const [sel,setSel]= useState(null);
    const [form,setForm]= useState(null);   // null | {edit: row|null}

    if(form) return <FormRecette existing={form.edit} prefill={form.prefill} onDone={()=>{setForm(null);setSel(null);reloadR();}} onCancel={()=>setForm(null)} />;
    if(!livre) return <p style={note}>Chargement du livre de recettes…</p>;

    const dbTagged = (recettesDB||[]).map(r=>({ ...(r.data||{}), id:r.id, _type:r.type, _uid:"db-"+r.id, _source:"db", _row:r }));
    const dbNoms = new Set(dbTagged.map(r=>(r.nom||"").toLowerCase().trim()));
    const all = [...dbTagged, ...recettesLivre(livre).filter(r=>!dbNoms.has((r.nom||"").toLowerCase().trim()))];

    if(sel){
      const prog = sel._source==="db" ? (sel.progression||"") : (progs[String(sel.id)] || sel.progression || "");
      return (
        <div>
          <button onClick={()=>setSel(null)} style={{...btn,marginBottom:12}}>← Retour au livre</button>
          <div style={{fontSize:"0.6rem",color:"#999",textTransform:"uppercase",letterSpacing:"0.08em"}}>{sel._type} · {sel.categorie} {sel._source==="db"&&<span style={{color:"#2d6a4f"}}>· ✎ créée par un chef</span>}</div>
          <h2 style={{fontSize:"1.15rem",color:"#1a0a00",margin:"3px 0 8px"}}>{sel.nom}</h2>
          {sel.description && <p style={{fontSize:"0.82rem",color:"#666",fontStyle:"italic",margin:"0 0 6px"}}>{sel.description}</p>}
          <div style={sec}>Ingrédients</div>
          {(sel.ingredients||[]).map((g,i)=><div key={i} style={{fontSize:"0.8rem",color:"#333",padding:"3px 0",borderBottom:"1px solid #f2ede4"}}>• {g}</div>)}
          {prog && <><div style={sec}>Progression</div><p style={{fontSize:"0.8rem",color:"#444",lineHeight:1.6,whiteSpace:"pre-wrap",margin:0}}>{prog}</p></>}
          {sel.allergenes&&sel.allergenes.length>0 && <><div style={sec}>Allergènes</div><div style={{fontSize:"0.78rem",color:"#555"}}>{sel.allergenes.map(a=>ALLERG[a]?ALLERG[a][1]+" "+ALLERG[a][0]:a).join("  ·  ")}</div></>}
          <button onClick={()=>onCreate(sel)} style={{...btn,width:"100%",marginTop:18,background:"#7b3f00",color:"#fff",border:"none",padding:"11px"}}>➕ Créer une fiche de coût à partir de cette recette</button>
          {sel._source==="db"
            ? <div style={{display:"flex",gap:8,marginTop:8}}>
                <button onClick={()=>setForm({edit:sel._row})} style={{...btn,flex:1,fontSize:"0.75rem"}}>✏️ Modifier</button>
                <button onClick={async()=>{ if(confirm("Supprimer cette recette ?")){ await sb.from("recettes").delete().eq("id",sel.id); setSel(null); reloadR(); } }} style={{...btn,flex:1,fontSize:"0.75rem",color:"#c00"}}>🗑 Supprimer</button>
              </div>
            : <button onClick={()=>setForm({edit:null,prefill:{...sel,progression:prog}})} style={{...btn,width:"100%",marginTop:8,fontSize:"0.76rem"}}>✏️ Corriger cette recette (crée une version modifiable)</button>}
        </div>
      );
    }

    const liste = all.filter(r=>(r.nom+" "+(r.description||"")).toLowerCase().includes(q.toLowerCase()) && (cat==="Toutes"||r._type===cat));
    return (
      <div>
        <H titre="Livre de recettes" />
        <button onClick={()=>setForm({edit:null})} style={{...btn,width:"100%",background:"#7b3f00",color:"#fff",border:"none",marginBottom:10}}>+ Nouvelle recette</button>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {[["Toutes","Toutes"],["Entrée","Entrées"],["Plat","Plats"],["Dessert","Desserts"]].map(([v,l])=>(
            <button key={v} onClick={()=>setCat(v)} style={{flex:1,border:"1px solid "+(cat===v?"#7b3f00":"#ddd"),background:cat===v?"#7b3f00":"#fff",color:cat===v?"#fff":"#7b3f00",borderRadius:8,padding:"6px 3px",cursor:"pointer",fontSize:"0.7rem",fontWeight:"bold"}}>{l}</button>
          ))}
        </div>
        <SearchBar q={q} setQ={setQ} ph="Rechercher une recette…" />
        <div style={{fontSize:"0.62rem",color:"#aaa",marginBottom:8}}>{liste.length} recettes</div>
        {liste.map(r=>(
          <div key={r._uid} onClick={()=>setSel(r)} style={{background:"#fff",border:"1px solid "+(r._source==="db"?"#bcdccb":"#eee"),borderRadius:10,padding:"10px 12px",marginBottom:6,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div><div style={{fontSize:"0.56rem",color:"#999",textTransform:"uppercase"}}>{r._type} · {r.categorie} {r._source==="db"&&<span style={{color:"#2d6a4f"}}>· chef</span>}</div><div style={{fontWeight:"bold",color:"#1a0a00",fontSize:"0.88rem"}}>{r.nom}</div></div>
            <span style={{color:"#ccc",fontSize:"1.2rem"}}>›</span>
          </div>
        ))}
      </div>
    );
  }

  function FormRecette({existing,prefill,onDone,onCancel}){
    const d=existing?.data|| prefill || {};
    const [nom,setNom]   = useState(existing?.nom || prefill?.nom || "");
    const [type,setType] = useState(existing?.type || prefill?._type || "Entrée");
    const [categ,setCateg]= useState(d.categorie || "");
    const [desc,setDesc] = useState(d.description || "");
    const [ings,setIngs] = useState(d.ingredients&&d.ingredients.length ? d.ingredients : [""]);
    const [prog,setProg] = useState(d.progression || "");
    const [alg,setAlg]   = useState(d.allergenes || []);
    const [busy,setBusy] = useState(false);
    const tog = k => setAlg(alg.includes(k)?alg.filter(x=>x!==k):[...alg,k]);
    async function save(){
      if(!nom.trim()){ alert("Donnez un nom à la recette."); return; }
      setBusy(true);
      const data={ nom, categorie:categ, description:desc, ingredients:ings.filter(x=>x.trim()), progression:prog, allergenes:alg };
      const payload={ nom, type, data };
      const res=existing?await sb.from("recettes").update(payload).eq("id",existing.id):await sb.from("recettes").insert(payload);
      setBusy(false);
      if(res.error){ alert("Erreur : "+res.error.message); return; }
      onDone();
    }
    return (
      <div>
        <H titre={existing?"Modifier la recette":"Nouvelle recette"} />
        <label style={lbl}>Nom</label>
        <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Ex : Velouté de potiron" style={inp} />
        <label style={{...lbl,marginTop:10}}>Catégorie de menu</label>
        <select value={type} onChange={e=>setType(e.target.value)} style={inp}>{TYPES.map(t=><option key={t}>{t}</option>)}</select>
        <label style={{...lbl,marginTop:10}}>Sous-catégorie (libre)</label>
        <input value={categ} onChange={e=>setCateg(e.target.value)} placeholder="Ex : Soupes, Volailles, Tartes…" style={inp} />
        <label style={{...lbl,marginTop:10}}>Description</label>
        <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Courte description" style={inp} />

        <div style={sec}>Ingrédients</div>
        {ings.map((g,i)=>(
          <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <input value={g} onChange={e=>setIngs(ings.map((x,j)=>j===i?e.target.value:x))} placeholder="Ex : 0,250 kg farine" style={{...inp,flex:1}} />
            <button onClick={()=>setIngs(ings.filter((_,j)=>j!==i))} style={{border:"none",background:"none",color:"#c00",cursor:"pointer"}}>✕</button>
          </div>
        ))}
        <button onClick={()=>setIngs([...ings,""])} style={{...btn,fontSize:"0.72rem",padding:"5px 10px"}}>+ ajouter un ingrédient</button>

        <div style={sec}>Progression</div>
        <textarea value={prog} onChange={e=>setProg(e.target.value)} placeholder="Étapes de la recette…" style={{...inp,minHeight:90,resize:"vertical"}} />

        <div style={sec}>Allergènes</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(ALLERG).map(([k,v])=>(
            <button key={k} onClick={()=>tog(k)} style={{border:"1px solid "+(alg.includes(k)?"#7b3f00":"#ddd"),background:alg.includes(k)?"#7b3f00":"#fff",color:alg.includes(k)?"#fff":"#555",borderRadius:16,padding:"4px 9px",cursor:"pointer",fontSize:"0.68rem"}}>{v[1]} {v[0]}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={onCancel} style={{...btn,flex:1}}>Annuler</button>
          <button onClick={save} disabled={busy} style={{...btn,flex:2,background:"#7b3f00",color:"#fff",border:"none"}}>{busy?"…":"☁ Enregistrer la recette"}</button>
        </div>
      </div>
    );
  }

  // ================= MENU =================
  function VueMenu({fiches,sousfiches,reload}){
    const parType = t => fiches.filter(f=>f.type===t);
    const [sel,setSel]=useState({"Entrée":[""],"Plat":[""],"Dessert":[""]});
    const [coef,setCoef]=useState(3.5);
    const [nom,setNom]=useState("Menu du jour");
    const [maison,setMaison]=useState(MAISONS[0]);
    const [couverts,setCouverts]=useState("10");
    const [flash,setFlash]=useState("");
    const nb = Math.max(1,Math.round(num(couverts)));
    const setSlot=(t,i,v)=>setSel(s=>({...s,[t]:s[t].map((x,j)=>j===i?v:x)}));
    const addSlot=t=>setSel(s=>({...s,[t]:[...s[t],""]}));
    const removeSlot=(t,i)=>setSel(s=>({...s,[t]:s[t].filter((_,j)=>j!==i)}));
    const choisies = TYPES.flatMap(t=>(sel[t]||[]).map(id=>fiches.find(f=>f.id===id)).filter(Boolean));
    const total = choisies.reduce((s,f)=>s+coutFiche(f,sousfiches),0);
    const pv=total*coef, marge=pv-total, foodcost=pv>0?total/pv*100:0;

    async function save(){
      if(choisies.length===0){ alert("Choisissez au moins une fiche."); return; }
      const m={nom,maison,couverts:nb,date:new Date().toLocaleString('fr-FR'),items:choisies.map(f=>f.type+" · "+f.nom),total,pv,coef,foodcost,achats:achatsMenu(choisies,sousfiches)};
      const { error } = await sb.from("menus").insert({ nom, data:m });
      if(error){ alert("Erreur : "+error.message); return; }
      setFlash("Menu enregistré dans le registre ✔"); setTimeout(()=>setFlash(""),2500); reload();
    }

    return (
      <div>
        <H titre="Composer un menu" />
        <div style={{background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"9px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
          <label style={{...lbl,marginBottom:0,flex:1}}>Nombre de couverts (clients)</label>
          <input type="number" min="1" step="1" value={couverts} onChange={e=>setCouverts(e.target.value)} style={{width:72,padding:"7px 8px",border:"1px solid #ddd",borderRadius:6,textAlign:"right",fontSize:"0.95rem"}} />
        </div>
        {fiches.length===0 && <p style={note}>Aucune fiche disponible. Créez d'abord des fiches dans l'onglet « Recettes ».</p>}
        {TYPES.map(t=>(
          <div key={t} style={{marginBottom:12}}>
            <label style={lbl}>{t}s</label>
            {(sel[t]||[]).map((id,i)=>(
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                <select value={id} onChange={e=>setSlot(t,i,e.target.value)} style={{...inp,flex:1}}>
                  <option value="">— aucun —</option>
                  {parType(t).map(f=><option key={f.id} value={f.id}>{f.nom} ({eur(coutFiche(f,sousfiches))}/pers.)</option>)}
                </select>
                {(sel[t].length>1) && <button onClick={()=>removeSlot(t,i)} style={{border:"none",background:"none",color:"#c00",cursor:"pointer"}}>✕</button>}
              </div>
            ))}
            <button onClick={()=>addSlot(t)} style={{...btn,fontSize:"0.7rem",padding:"4px 10px"}}>+ ajouter {t==="Entrée"?"une entrée":t==="Plat"?"un plat":"un dessert"}</button>
          </div>
        ))}
        {choisies.length>0 && <Card>
          {choisies.map(f=><Row key={f.id} g={f.type+" · "+f.nom} d={eur(coutFiche(f,sousfiches))} />)}
          <Row g={<b>Coût matière / personne</b>} d={<b>{eur(total)}</b>} top />
        </Card>}

        <div style={{marginTop:12}}>
          <label style={lbl}>Coefficient : <b>{coef.toFixed(1)}</b></label>
          <input type="range" min="1.5" max="6" step="0.1" value={coef} onChange={e=>setCoef(parseFloat(e.target.value))} style={{width:"100%"}} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
          <Stat label="Prix de vente conseillé" val={eur(pv)} big accent />
          <Stat label="Marge (matière)" val={eur(marge)} />
          <Stat label="Coût matière" val={foodcost.toFixed(1).replace('.',',')+" %"} />
          <Stat label="Nb services" val={String(choisies.length)} />
        </div>
        {choisies.length>0 && <p style={{fontSize:"0.72rem",color:"#8a7050",textAlign:"center",margin:"8px 0 0"}}>Pour <b>{nb}</b> couverts → matière <b>{eur(total*nb)}</b> · vente <b>{eur(pv*nb)}</b></p>}

        <div style={{marginTop:14,background:"#fff",border:"1px solid #eee",borderRadius:10,padding:12}}>
          <label style={lbl}>Maison</label>
          <select value={maison} onChange={e=>setMaison(e.target.value)} style={inp}>{MAISONS.map(mm=><option key={mm}>{mm}</option>)}</select>
          <label style={{...lbl,marginTop:10}}>Nom du menu</label>
          <input value={nom} onChange={e=>setNom(e.target.value)} style={inp} />
          <button onClick={save} style={{...btn,width:"100%",marginTop:10,background:"#7b3f00",color:"#fff",border:"none"}}>☁ Enregistrer dans le registre</button>
          {flash && <div style={{textAlign:"center",color:"#2d6a4f",fontSize:"0.8rem",marginTop:8}}>{flash}</div>}
        </div>
      </div>
    );
  }

  // ---------- composants & styles ----------
  const H = ({titre}) => <h2 style={{fontSize:"1rem",color:"#7b3f00",margin:"4px 0 12px"}}>{titre}</h2>;
  const Card = ({children}) => <div style={{background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"10px 14px",marginTop:10}}>{children}</div>;
  const Row = ({g,m,d,top}) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"5px 0",borderTop:top?"1px solid #eee":"none"}}>
      <span style={{color:"#333",fontSize:"0.8rem",flex:1}}>{g}</span>
      {m && <span style={{color:"#999",fontSize:"0.7rem"}}>{m}</span>}
      <span style={{color:"#1a0a00",fontSize:"0.8rem",minWidth:60,textAlign:"right"}}>{d}</span>
    </div>
  );
  const Stat = ({label,val,big,accent}) => (
    <div style={{background:accent?"#e7f2ec":"#fff",border:"1px solid "+(accent?"#bcdccb":"#eee"),borderRadius:10,padding:"9px 12px"}}>
      <div style={{fontSize:"0.6rem",color:accent?"#2d6a4f":"#999"}}>{label}</div>
      <div style={{fontSize:big?"1.25rem":"1.05rem",fontWeight:"bold",color:accent?"#2d6a4f":"#1a0a00"}}>{val}</div>
    </div>
  );
  const lbl = {display:"block",fontSize:"0.66rem",color:"#8a7050",marginBottom:4};
  const inp = {width:"100%",boxSizing:"border-box",padding:"9px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:"0.85rem",background:"#fff"};
  const btn = {padding:"9px 12px",borderRadius:8,border:"1px solid #ccc",background:"#fff",cursor:"pointer",fontSize:"0.85rem"};
  const miniBtn = {border:"none",background:"none",color:"#7b3f00",cursor:"pointer",fontSize:"0.66rem",padding:0};
  const note = {fontSize:"0.72rem",color:"#8a7050",fontStyle:"italic",background:"#efe8dc",padding:"8px 10px",borderRadius:8,margin:"4px 0 10px"};
  const sec = {fontSize:"0.64rem",color:"#8a7050",letterSpacing:"0.1em",textTransform:"uppercase",borderTop:"1px solid #e0d8cc",marginTop:14,paddingTop:10,marginBottom:8};
  const sfTag = {background:"#eef3ff",color:"#3760a5",fontSize:"0.58rem",padding:"1px 6px",borderRadius:8,marginRight:4};

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
